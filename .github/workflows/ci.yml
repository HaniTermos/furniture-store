# ═══════════════════════════════════════════════════════════════
#  CI/CD Pipeline — HTW Furniture Store
#  Runs on push/PR to main: lint, test, build
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test

jobs:
  # ─── Server Tests ─────────────────────────────────────────
  server-test:
    name: Server — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: furniture_store_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: furniture_store_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          SESSION_SECRET: ci-test-session-secret
          CLIENT_URL: http://localhost:3000
        run: npm test -- --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage/

  # ─── Client Build ─────────────────────────────────────────
  client-build:
    name: Client — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint
        continue-on-error: true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
        run: npm run build

  # ─── Docker Build (smoke test) ────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [server-test, client-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t furniture-server ./server

      - name: Verify server image
        run: docker image inspect furniture-server > /dev/null 2>&1
